version: "3"
services:
  e2e-test:
    image: golang:1.19
    env_file:
      - .env
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com}
      - DASHSCOPE_ASR_MODEL=${DASHSCOPE_ASR_MODEL:-fun-asr}
      - DASHSCOPE_VIDEO_MODEL=${DASHSCOPE_VIDEO_MODEL:-qwen3.5-omni-plus}
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod:/go/pkg/mod
    command: ["go", "test", "./pkg/", "-v", "-run", "TestE2E", "-timeout", "600s"]

volumes:
  go-cache:
  go-mod:
