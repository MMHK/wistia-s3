version: "3"
services:
  build-img:
    image: "mmhk/wistia-s3"
    build:
      context: .
      dockerfile: Dockerfile

  wistia-s3:
    image: "mmhk/wistia-s3"
    restart: always
    container_name: wistia-s3
    environment:
      - S3_KEY=${S3_KEY}
      - S3_SECRET=${S3_SECRET}
      - S3_REGION=ap-southeast-1
      - S3_BUCKET=${S3_BUCKET}
      - S3_PREFIX=${S3_PREFIX}
      - S3_CLOUDFRONT_DOMAIN=${S3_CLOUDFRONT_DOMAIN}
      - S3_CLOUDFRONT_DIST_ID=${S3_CLOUDFRONT_DIST_ID}
      - WISTIA_API_KEY=${WISTIA_API_KEY}
      - WISTIA_WORKER_LIMIT=3
      - TEMPLATE_DIR_PATH=/app/web/dist
      - LOG_LEVEL=INFO
      - TZ=Asia/Hong_Kong
      - LISTEN=0.0.0.0:3031
      - WEBROOT=/app/webroot
      - DB_FILE_PATH=/app/wista-s3.db
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com}
      - DASHSCOPE_ASR_MODEL=${DASHSCOPE_ASR_MODEL:-qwen3-asr-flash-filetrans}
      - DASHSCOPE_VIDEO_MODEL=${DASHSCOPE_VIDEO_MODEL:-qwen3.5-omni-flash}
    ports:
      - "3031:3031"
